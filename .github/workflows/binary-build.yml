name: binary-build

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      release-tag:
        description: "Existing release tag to attach assets to, for example v1.0.3"
        required: false
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  BUN_VERSION: "1.3.14"
  NODE_VERSION: "24"

jobs:
  smoke:
    if: github.repository_owner == 'oaslananka' || github.repository_owner == 'oaslananka-ops'
    name: binary / smoke (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-x64
            runner: ubuntu-24.04
          - target: linux-arm64
            runner: ubuntu-24.04-arm
          - target: macos-x64
            runner: macos-15-intel
          - target: macos-arm64
            runner: macos-15
          - target: windows-x64
            runner: windows-2025-vs2026
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: ${{ inputs['release-tag'] || github.ref }}
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: ${{ env.NODE_VERSION }}
          package-manager-cache: false
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: ${{ env.BUN_VERSION }}
          no-cache: true
      - run: corepack enable
      - run: corepack install
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build:binary -- --target ${{ matrix.target }}
      - run: pnpm run build:binary:verify -- --target ${{ matrix.target }}
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: boardreadyops-${{ matrix.target }}
          path: dist/binary/boardreadyops-*
          if-no-files-found: error

  release-assets:
    if: github.repository_owner == 'oaslananka' || github.repository_owner == 'oaslananka-ops'
    name: binary / release-assets
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    needs: smoke
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: ${{ inputs['release-tag'] || github.ref }}
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: ${{ env.NODE_VERSION }}
          package-manager-cache: false
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          pattern: boardreadyops-*
          path: dist/binary
          merge-multiple: true
      - run: corepack enable
      - run: corepack install
      - run: pnpm install --frozen-lockfile
      - run: pnpm run sbom
      - name: Verify downloaded binary artifacts and generate checksums
        run: pnpm run build:binary:assets
      - name: Verify generated checksums are current
        run: pnpm run build:binary:assets -- --check
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: boardreadyops-binaries
          path: |
            dist/binary/
            SHA256SUMS
            sbom.cyclonedx.json
      - name: Upload release assets
        if: startsWith(github.ref, 'refs/tags/v') || inputs['release-tag'] != ''
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs['release-tag'] || github.ref_name }}
        run: |
          set -euo pipefail
          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            gh release upload "${RELEASE_TAG}" dist/binary/* SHA256SUMS sbom.cyclonedx.json
          else
            gh release create "${RELEASE_TAG}" \
              dist/binary/* SHA256SUMS sbom.cyclonedx.json \
              --verify-tag \
              --generate-notes \
              --title "${RELEASE_TAG}"
          fi
      - name: Verify release asset publication
        if: startsWith(github.ref, 'refs/tags/v') || inputs['release-tag'] != ''
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs['release-tag'] || github.ref_name }}
        run: |
          set -euo pipefail
          gh release view "${RELEASE_TAG}" --json assets --jq "
            [.assets[].name] as \$assets
            | [\"boardreadyops-linux-x64\",\"boardreadyops-linux-arm64\",\"boardreadyops-macos-x64\",\"boardreadyops-macos-arm64\",\"boardreadyops-win-x64.exe\",\"SHA256SUMS\",\"sbom.cyclonedx.json\"] as \$expected
            | (\$expected - (\$expected - \$assets)) as \$present
            | if (\$present | length) == (\$expected | length)
              then \$present
              else error(\"missing release assets: \" + ((\$expected - \$assets) | join(\", \")))
              end
          "
