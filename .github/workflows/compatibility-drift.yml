name: compatibility-drift

on:
  schedule:
    - cron: "23 5 * * 1"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  issues: write

jobs:
  check-drift:
    if: github.repository_owner == 'oaslananka' || github.repository_owner == 'oaslananka-ops'
    name: compatibility-drift / check
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 24
          package-manager-cache: false
      - run: corepack enable
      - run: corepack install
      - run: pnpm install --frozen-lockfile
      - id: drift
        run: |
          pnpm run compatibility:drift -- \
            --markdown-output compatibility-drift.md \
            --json-output compatibility-drift.json \
            --github-output "${GITHUB_OUTPUT}"
      - name: Open compatibility drift issue
        if: steps.drift.outputs.drift == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_TITLE: ${{ steps.drift.outputs.issue_title }}
        run: |
          set -euo pipefail
          existing="$(gh issue list --state open --search "${ISSUE_TITLE} in:title" --json number --jq '.[0].number // empty')"
          if [ -n "${existing}" ]; then
            echo "Compatibility drift issue already open: #${existing}"
            exit 0
          fi
          gh issue create --title "${ISSUE_TITLE}" --body-file compatibility-drift.md
