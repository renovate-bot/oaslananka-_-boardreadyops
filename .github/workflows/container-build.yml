name: container-build

on:
  pull_request:
    paths:
      - .github/workflows/container-build.yml
      - apps/container/**
      - tests/unit/container-action.test.ts
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: Published boardreadyops npm version to install in the container.
        required: false
        type: string
      publish:
        description: Publish GHCR tags for the provided version from the selected workflow ref.
        required: false
        default: false
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/boardreadyops-full
  NODE_VERSION: "24.18.0"
  KICAD_PPA_SERIES: "10.0"

jobs:
  smoke:
    if: github.repository_owner == 'oaslananka' || github.repository_owner == 'oaslananka-ops'
    name: container-build / smoke (KiCad ${{ matrix.kicad-version }}, Node ${{ matrix.node-version }})
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - kicad-version: "10.0"
            kicad-ppa-series: "10.0"
            node-version: "24.18.0"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      - id: package
        name: Resolve package version
        env:
          MANUAL_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          if [ -n "${MANUAL_VERSION}" ]; then
            version="${MANUAL_VERSION#v}"
          elif [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            version="${GITHUB_REF_NAME#v}"
          else
            version="$(jq -er '.version' package.json)"
          fi
          echo "version=${version}" >> "${GITHUB_OUTPUT}"
      - name: Wait for npm package availability
        env:
          PACKAGE_VERSION: ${{ steps.package.outputs.version }}
        run: |
          set -euo pipefail
          for attempt in {1..30}; do
            if npm view "boardreadyops@${PACKAGE_VERSION}" version >/dev/null 2>&1; then
              exit 0
            fi
            echo "boardreadyops@${PACKAGE_VERSION} is not available on npm yet; retry ${attempt}/30"
            sleep 10
          done
          echo "::error::boardreadyops@${PACKAGE_VERSION} is not available on npm yet"
          exit 1
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5
      - name: Build local smoke image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf
        with:
          context: apps/container
          file: apps/container/Dockerfile
          load: true
          push: false
          tags: boardreadyops-full:smoke-kicad-${{ matrix.kicad-version }}-node-${{ matrix.node-version }}
          build-args: |
            BOARDREADYOPS_VERSION=${{ steps.package.outputs.version }}
            NODE_VERSION=${{ matrix.node-version }}
            KICAD_PPA_SERIES=${{ matrix.kicad-ppa-series }}
      - name: Smoke container CLI
        run: docker run --rm boardreadyops-full:smoke-kicad-${{ matrix.kicad-version }}-node-${{ matrix.node-version }} --help
      - name: Smoke fixture project
        run: |
          docker run --rm \
            --volume "${PWD}/tests/fixtures/projects/safe-basic:/workspace" \
            --workdir /workspace \
            boardreadyops-full:smoke-kicad-${{ matrix.kicad-version }}-node-${{ matrix.node-version }} \
            check .
      - name: Scan smoke image
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          image-ref: boardreadyops-full:smoke-kicad-${{ matrix.kicad-version }}-node-${{ matrix.node-version }}
          scan-type: image
          severity: HIGH,CRITICAL
          exit-code: "1"

  publish:
    name: container-build / publish
    if: (github.repository_owner == 'oaslananka' || github.repository_owner == 'oaslananka-ops') && (startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.publish))
    needs: smoke
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      - id: package
        name: Resolve npm package version
        env:
          MANUAL_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            version="${GITHUB_REF_NAME#v}"
          else
            version="${MANUAL_VERSION#v}"
          fi
          if [ -z "${version}" ]; then
            echo "::error::workflow_dispatch publish requires a version input"
            exit 1
          fi
          echo "version=${version}" >> "${GITHUB_OUTPUT}"
      - name: Wait for npm package availability
        env:
          PACKAGE_VERSION: ${{ steps.package.outputs.version }}
        run: |
          set -euo pipefail
          for attempt in {1..30}; do
            if npm view "boardreadyops@${PACKAGE_VERSION}" version >/dev/null 2>&1; then
              exit 0
            fi
            echo "boardreadyops@${PACKAGE_VERSION} is not available on npm yet; retry ${attempt}/30"
            sleep 10
          done
          echo "::error::boardreadyops@${PACKAGE_VERSION} is not available on npm yet"
          exit 1
      - id: image-tags
        name: Resolve image tags
        run: |
          set -euo pipefail
          version="${{ steps.package.outputs.version }}"
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            tag="${GITHUB_REF_NAME}"
          else
            tag="v${version}"
          fi
          echo "image-tag=${tag}" >> "${GITHUB_OUTPUT}"
          {
            echo "tags<<TAGS"
            echo "${IMAGE_NAME}:${tag}"
            if [[ "${version}" != *-* ]]; then
              major="${version%%.*}"
              echo "${IMAGE_NAME}:v${major}"
              echo "${IMAGE_NAME}:latest"
            fi
            echo "TAGS"
          } >> "${GITHUB_OUTPUT}"
      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5
      - id: publish
        name: Publish multi-arch image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf
        with:
          context: apps/container
          file: apps/container/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: true
          sbom: true
          tags: ${{ steps.image-tags.outputs.tags }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.image-tags.outputs.image-tag }}
          build-args: |
            BOARDREADYOPS_VERSION=${{ steps.package.outputs.version }}
            NODE_VERSION=${{ env.NODE_VERSION }}
            KICAD_PPA_SERIES=${{ env.KICAD_PPA_SERIES }}
      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6
      - name: Sign image digest
        env:
          DIGEST: ${{ steps.publish.outputs.digest }}
        run: cosign sign --yes "${IMAGE_NAME}@${DIGEST}"
      - name: Scan published image
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          image-ref: ${{ env.IMAGE_NAME }}@${{ steps.publish.outputs.digest }}
          scan-type: image
          severity: HIGH,CRITICAL
          exit-code: "1"
      - name: Generate CycloneDX image SBOM
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          image-ref: ${{ env.IMAGE_NAME }}@${{ steps.publish.outputs.digest }}
          scan-type: image
          format: cyclonedx
          output: boardreadyops-full.cyclonedx.json
          exit-code: "0"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: boardreadyops-full-cyclonedx
          path: boardreadyops-full.cyclonedx.json
