name: mutation-nightly

on:
  schedule:
    - cron: "43 2 * * *"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: "24"

jobs:
  mutation:
    if: github.repository_owner == 'oaslananka' || github.repository_owner == 'oaslananka-ops'
    name: mutation-nightly / full
    runs-on: ubuntu-24.04
    timeout-minutes: 150
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: ${{ env.NODE_VERSION }}
          package-manager-cache: false
      - name: Restore mutation incremental state
        id: mutation-cache
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9
        with:
          path: reports/stryker-incremental.json
          key: mutation-${{ runner.os }}-node-${{ env.NODE_VERSION }}-${{ hashFiles('pnpm-lock.yaml', 'stryker.config.mjs') }}-${{ github.sha }}
          restore-keys: |
            mutation-${{ runner.os }}-node-${{ env.NODE_VERSION }}-${{ hashFiles('pnpm-lock.yaml', 'stryker.config.mjs') }}-
      - run: corepack enable
      - run: corepack install
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec stryker run --incremental --incrementalFile reports/stryker-incremental.json
      - name: Save mutation incremental state
        if: always() && steps.mutation-cache.outputs.cache-hit != 'true' && hashFiles('reports/stryker-incremental.json') != ''
        uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9
        with:
          path: reports/stryker-incremental.json
          key: ${{ steps.mutation-cache.outputs.cache-primary-key }}
      - name: Check mutation thresholds
        if: always()
        run: pnpm run mutation:check --summary
      - name: Upload mutation report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        if: always()
        with:
          name: mutation-report
          path: reports/mutation/
          if-no-files-found: warn
