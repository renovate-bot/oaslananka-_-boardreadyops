name: publish-npm

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to publish, for example v1.1.0.
        required: false
        type: string
      prerelease:
        description: Publish to npm with the next dist-tag.
        required: false
        default: false
        type: boolean
      update_floating_tags:
        description: Move vMAJOR and vMAJOR.MINOR tags after a stable publish.
        required: false
        default: false
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ inputs.tag || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  UV_VERSION: "0.11.16"

jobs:
  publish-npm:
    if: github.repository_owner == 'oaslananka' || github.repository_owner == 'oaslananka-ops'
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    permissions:
      contents: read
      id-token: write
      attestations: write
    outputs:
      release_allows_floating_tags: ${{ steps.release.outputs.release_allows_floating_tags }}
      release_is_prerelease: ${{ steps.release.outputs.release_is_prerelease }}
      release_tag: ${{ steps.release.outputs.release_tag }}
      should_publish: ${{ steps.release.outputs.should_publish }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ inputs.tag || github.ref }}
      - name: Resolve release metadata
        id: release
        env:
          DISPATCH_PRERELEASE: ${{ inputs.prerelease }}
          DISPATCH_TAG: ${{ inputs.tag }}
          DISPATCH_UPDATE_FLOATING_TAGS: ${{ inputs.update_floating_tags }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          release_tag=""
          release_is_prerelease="false"
          release_allows_floating_tags="false"
          should_publish="true"

          release_tag="${DISPATCH_TAG}"
          release_is_prerelease="${DISPATCH_PRERELEASE}"
          release_allows_floating_tags="${DISPATCH_UPDATE_FLOATING_TAGS}"

          if [ "${should_publish}" = "true" ] && [ -z "${release_tag}" ]; then
            echo "::error::Could not resolve a release tag for workflow_dispatch."
            exit 1
          fi

          {
            echo "RELEASE_IS_PRERELEASE=${release_is_prerelease}"
            echo "RELEASE_ALLOWS_FLOATING_TAGS=${release_allows_floating_tags}"
            echo "RELEASE_TAG=${release_tag}"
            echo "SHOULD_PUBLISH=${should_publish}"
          } >> "${GITHUB_ENV}"
          {
            echo "release_allows_floating_tags=${release_allows_floating_tags}"
            echo "release_is_prerelease=${release_is_prerelease}"
            echo "release_tag=${release_tag}"
            echo "should_publish=${should_publish}"
          } >> "${GITHUB_OUTPUT}"
      - name: Verify release commit
        if: env.SHOULD_PUBLISH == 'true'
        env:
          REQUIRE_EXACT_MAIN: "false"
        run: |
          set -euo pipefail
          git fetch --no-tags origin main "refs/tags/${RELEASE_TAG}:refs/tags/${RELEASE_TAG}"
          package_version="$(jq -er '.version' package.json)"
          if [ "v${package_version}" != "${RELEASE_TAG}" ]; then
            echo "::error::Package version ${package_version} does not match ${RELEASE_TAG}."
            exit 1
          fi
          release_commit="$(git rev-parse "${RELEASE_TAG}^{commit}")"
          main_commit="$(git rev-parse "origin/main^{commit}")"
          if [ "${REQUIRE_EXACT_MAIN}" = "true" ] && [ "${release_commit}" != "${main_commit}" ]; then
            echo "::error::Release tag ${RELEASE_TAG} must point at origin/main HEAD before publishing."
            exit 1
          fi
          if [ "${REQUIRE_EXACT_MAIN}" != "true" ] && ! git merge-base --is-ancestor "${release_commit}" "${main_commit}"; then
            echo "::error::Release tag ${RELEASE_TAG} must be an ancestor of origin/main before manual publishing."
            exit 1
          fi
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        if: env.SHOULD_PUBLISH == 'true'
        with:
          node-version: 24
          package-manager-cache: false
      - name: Ensure npm supports trusted publishing
        if: env.SHOULD_PUBLISH == 'true'
        run: |
          set -euo pipefail
          node --version
          npm --version
          npm install -g npm@latest
          npm --version
      - if: env.SHOULD_PUBLISH == 'true'
        run: corepack enable
      - if: env.SHOULD_PUBLISH == 'true'
        run: corepack install
      - name: Setup uv
        if: env.SHOULD_PUBLISH == 'true'
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: false
      - name: Install Python docs dependencies
        if: env.SHOULD_PUBLISH == 'true'
        run: |
          docs_venv="${RUNNER_TEMP}/boardreadyops-docs-venv"
          uv venv "${docs_venv}"
          uv pip install --python "${docs_venv}/bin/python" -r docs/requirements.txt
          echo "${docs_venv}/bin" >> "${GITHUB_PATH}"
      - if: env.SHOULD_PUBLISH == 'true'
        run: pnpm install --frozen-lockfile
      - name: Verify release package
        if: env.SHOULD_PUBLISH == 'true'
        env:
          EVENT_NAME: ${{ github.event_name }}
          ALLOW_MAJOR_RELEASE: "true"
          NO_MKDOCS_2_WARNING: "1"
        run: |
          set -euo pipefail
          if [ "${EVENT_NAME}" = "release" ]; then
            pnpm run verify
            exit 0
          fi

          pnpm run lint
          pnpm run typecheck
          pnpm run verify:version
          pnpm run verify:marketplace
          test -s dist/cli/index.cjs
          test -s dist/action/index.cjs
          pack_json="${RUNNER_TEMP}/npm-pack.json"
          npm pack --dry-run --json > "${pack_json}"
          PACK_JSON="${pack_json}" node <<'NODE'
          const { readFileSync, statSync } = require("node:fs");

          const parsed = JSON.parse(readFileSync(process.env.PACK_JSON, "utf8"));
          const candidates = Array.isArray(parsed)
            ? parsed
            : Array.isArray(parsed?.files)
              ? [parsed]
              : Object.values(parsed ?? {}).filter((value) => Array.isArray(value?.files));
          if (candidates.length !== 1) {
            throw new Error(`npm pack returned ${candidates.length} metadata candidates`);
          }
          const [pack] = candidates;
          const files = new Set(pack.files.map((file) => file.path));
          const required = ["package.json", "dist/cli/index.cjs", "dist/action/index.cjs"];
          const missing = required.filter((file) => !files.has(file));
          if (missing.length > 0) {
            throw new Error(`npm pack is missing required files: ${missing.join(", ")}`);
          }

          const budgets = [
            ["dist/action/index.cjs", statSync("dist/action/index.cjs").size, 16_000_000],
            ["dist/cli/index.cjs", statSync("dist/cli/index.cjs").size, 12_500_000],
            ["packed size", pack.size, 6_000_000],
            ["unpacked size", pack.unpackedSize, 32_000_000],
          ];
          for (const [label, actual, budget] of budgets) {
            if (!Number.isFinite(actual) || actual > budget * 0.9) {
              throw new Error(`${label} exceeds its release budget: ${actual}/${budget}`);
            }
            console.log(`${label}: ${actual}/${budget}`);
          }
          NODE
      - if: env.SHOULD_PUBLISH == 'true'
        run: pnpm run sbom
      - name: Attest provenance
        if: env.SHOULD_PUBLISH == 'true'
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32
        with:
          subject-path: dist/**
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        if: env.SHOULD_PUBLISH == 'true'
        with:
          name: sbom
          path: sbom.cyclonedx.json
      - name: Publish npm package
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        if: env.SHOULD_PUBLISH == 'true'
        run: |
          set -euo pipefail

          # Authenticate with npm using the token secret, then let
          # provenance use OIDC trusted publisher.
          echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > "${HOME}/.npmrc"

          package_version="$(jq -er '.version' package.json)"
          published_version="$(npm view "boardreadyops@${package_version}" version --json 2>/dev/null | jq -r '. // empty' || true)"
          if [ "${published_version}" = "${package_version}" ]; then
            echo "boardreadyops@${package_version} is already published; skipping npm publish."
            exit 0
          fi
          if [ "${RELEASE_IS_PRERELEASE}" = "true" ]; then
            npm publish --access public --tag next
          else
            npm publish --access public
          fi

  floating-release-tags:
    if: ${{ (github.repository_owner == 'oaslananka' || github.repository_owner == 'oaslananka-ops') && needs.publish-npm.outputs.should_publish == 'true' && needs.publish-npm.outputs.release_is_prerelease == 'false' && needs.publish-npm.outputs.release_allows_floating_tags == 'true' }}
    needs: publish-npm
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ needs.publish-npm.outputs.release_tag }}
      - name: Update floating release tags
        env:
          GH_AUTH_TOKEN: ${{ secrets.GH_AUTH_TOKEN }}
          RELEASE_TAG: ${{ needs.publish-npm.outputs.release_tag }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GH_AUTH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          bash scripts/update-floating-tags.sh "${RELEASE_TAG}"
