name: BoardReadyOps Readiness Runner

on:
  workflow_dispatch:
    inputs:
      run_id:
        required: true
        type: string
      target:
        required: true
        type: string
      head_sha:
        required: true
        type: string
      result_url:
        required: true
        type: string
      safe_mode:
        required: false
        type: string
        default: "false"
      safe_mode_reasons:
        required: false
        type: string
        default: ""

permissions:
  contents: read
  id-token: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    steps:
      - name: Prepare runner
        id: readiness
        env:
          SAFE_MODE: ${{ inputs.safe_mode }}
          SAFE_MODE_REASONS: ${{ inputs.safe_mode_reasons }}
        run: |
          case "$SAFE_MODE" in
            true|false) ;;
            *)
              echo "safe_mode must be true or false" >&2
              exit 1
              ;;
          esac

          if [ "$SAFE_MODE" = "false" ] && [ -n "$SAFE_MODE_REASONS" ]; then
            echo "safe_mode_reasons requires safe_mode=true" >&2
            exit 1
          fi

          if [ "$SAFE_MODE" = "true" ]; then
            if [ -z "$SAFE_MODE_REASONS" ]; then
              echo "safe_mode=true requires at least one reason" >&2
              exit 1
            fi

            declare -A seen_reasons=()
            IFS=',' read -r -a reasons <<< "$SAFE_MODE_REASONS"
            for reason in "${reasons[@]}"; do
              case "$reason" in
                draft-pull-request|fork-pull-request|private-repository) ;;
                *)
                  echo "unsupported safe-mode reason: $reason" >&2
                  exit 1
                  ;;
              esac

              if [ -n "${seen_reasons[$reason]:-}" ]; then
                echo "duplicate safe-mode reason: $reason" >&2
                exit 1
              fi
              seen_reasons[$reason]=1
            done
          fi

          echo "runner-ready safe_mode=$SAFE_MODE"

      - name: Publish runner result
        if: always()
        env:
          RESULT_URL: ${{ inputs.result_url }}
          RUN_ID: ${{ inputs.run_id }}
          TARGET: ${{ inputs.target }}
          HEAD_SHA: ${{ inputs.head_sha }}
          READINESS_OUTCOME: ${{ steps.readiness.outcome }}
        run: |
          if ! [[ "$RUN_ID" =~ ^[0-9a-f]{8}-[0-9a-f]{4}-[1-5][0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}$ ]]; then
            echo "run_id must be a lowercase UUID" >&2
            exit 1
          fi

          expected_url="https://boardreadyops.oaslananka.dev/api/v1/runs/result?run_id=${RUN_ID}"

          if [ "$RESULT_URL" != "$expected_url" ]; then
            echo "result_url must target the BoardReadyOps production callback for this run" >&2
            exit 1
          fi

          if ! [[ "$TARGET" =~ ^[A-Za-z0-9_.-]+/[A-Za-z0-9_.-]+$ ]] || [[ "$TARGET" == *..* ]]; then
            echo "target must be a valid GitHub owner/repository name" >&2
            exit 1
          fi

          target_owner="${TARGET%%/*}"
          target_repository="${TARGET#*/}"
          if [ "${#target_owner}" -gt 39 ] || [ "${#target_repository}" -gt 100 ]; then
            echo "target owner or repository name exceeds GitHub limits" >&2
            exit 1
          fi

          if ! [[ "$HEAD_SHA" =~ ^[0-9a-f]{40}$ ]]; then
            echo "head_sha must be a full lowercase commit SHA" >&2
            exit 1
          fi

          status="completed"
          decision="pass"

          if [ "$READINESS_OUTCOME" != "success" ]; then
            status="failed"
            decision="error"
          fi

          payload="{\"status\":\"$status\",\"decision\":\"$decision\",\"findings\":[]}"
          audience="boardreadyops-cloud:${RUN_ID}"
          encoded_audience="$(python3 -c 'import sys, urllib.parse; print(urllib.parse.quote(sys.argv[1], safe=""))' "$audience")"
          oidc_response="$(curl --fail --silent --show-error \
            --header "authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=${encoded_audience}")"
          oidc_token="$(printf '%s' "$oidc_response" | python3 -c 'import json, sys; print(json.load(sys.stdin)["value"])')"

          if [ -z "$oidc_token" ]; then
            echo "GitHub OIDC token request returned an empty token" >&2
            exit 1
          fi

          curl --fail --silent --show-error \
            --request POST "$RESULT_URL" \
            --header "authorization: Bearer $oidc_token" \
            --header "content-type: application/json" \
            --data "$payload"
