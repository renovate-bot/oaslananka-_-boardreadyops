name: security

on:
  pull_request:
    paths-ignore:
      - docs/**
      - "*.md"
      - mkdocs.yml
      - .coderabbit.yaml
  push:
    branches: [main]
    paths-ignore:
      - docs/**
      - "*.md"
      - mkdocs.yml
      - .coderabbit.yaml
  schedule:
    - cron: "31 4 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: security-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

defaults:
  run:
    shell: bash

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  NODE_VERSION: "24"

  SCORECARD_CHECKS: Dangerous-Workflow,Dependency-Update-Tool,Fuzzing,License,Pinned-Dependencies,SAST,Security-Policy,Token-Permissions,Vulnerabilities
  SCORECARD_IMAGE: ghcr.io/ossf/scorecard:v5.5.0@sha256:3f24714e9366917adb7a05635382c97dfecb14b21eaef3dfa2ea48c8e23e0795
  SCORECARD_MIN_SCORE: "9.0"

jobs:
  dependency-review:
    name: security / dependency-review
    if: (github.repository_owner == 'oaslananka' || github.repository_owner == 'oaslananka-ops') && github.event_name == 'pull_request'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      - uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294
        with:
          fail-on-severity: high
          comment-summary-in-pr: never

  codeql:
    if: github.repository_owner == 'oaslananka' || github.repository_owner == 'oaslananka-ops'
    name: security / codeql
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      - uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e
        with:
          languages: javascript-typescript
          build-mode: none
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: ${{ env.NODE_VERSION }}
          package-manager-cache: false
      - run: corepack enable
      - run: corepack install
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
      - uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e

  osv:
    if: github.repository_owner == 'oaslananka' || github.repository_owner == 'oaslananka-ops'
    name: security / osv
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      - uses: google/osv-scanner-action/osv-scanner-action@9a498708959aeaef5ef730655706c5a1df1edbc2
        with:
          scan-args: |-
            --recursive
            .

  gitleaks:
    if: github.repository_owner == 'oaslananka' || github.repository_owner == 'oaslananka-ops'
    name: security / gitleaks
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Install Gitleaks
        env:
          GITLEAKS_VERSION: 8.30.1
        run: |
          set -euo pipefail
          workdir="${RUNNER_TEMP}/gitleaks-install"
          mkdir -p "${workdir}"
          cd "${workdir}"
          archive="gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          checksum_file="gitleaks_${GITLEAKS_VERSION}_checksums.txt"
          curl -sSfLO "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/${archive}"
          curl -sSfLO "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/${checksum_file}"
          grep " ${archive}$" "${checksum_file}" | sha256sum -c -
          tar -xzf "${archive}" gitleaks
          sudo install -m 0755 gitleaks /usr/local/bin/gitleaks
          gitleaks version
      - name: Run Gitleaks
        run: gitleaks detect --source . --redact --verbose

  sbom:
    if: github.repository_owner == 'oaslananka' || github.repository_owner == 'oaslananka-ops'
    name: security / sbom
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: ${{ env.NODE_VERSION }}
          package-manager-cache: false
      - run: corepack enable
      - run: corepack install
      - run: pnpm install --frozen-lockfile
      - run: pnpm run sbom
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: sbom
          path: sbom.cyclonedx.json

  scorecard:
    name: security / scorecard advisory
    if: (github.repository_owner == 'oaslananka' || github.repository_owner == 'oaslananka-ops') && github.event_name != 'pull_request'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      - name: Run enforced Scorecard baseline
        continue-on-error: true
        env:
          GITHUB_AUTH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          docker run --rm \
            -e GITHUB_AUTH_TOKEN \
            "${SCORECARD_IMAGE}" \
            --repo="github.com/${GITHUB_REPOSITORY}" \
            --checks="${SCORECARD_CHECKS}" \
            --show-details \
            --format=json > scorecard.json
          node scripts/check-scorecard-baseline.mjs \
            --report scorecard.json \
            --minimum "${SCORECARD_MIN_SCORE}" \
            --checks "${SCORECARD_CHECKS}" \
            --summary
      - name: Upload scorecard baseline
        if: always() && hashFiles('scorecard.json') != ''
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: scorecard-baseline
          path: scorecard.json
