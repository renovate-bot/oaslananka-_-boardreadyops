name: self-smoke

on:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  self-smoke:
    if: github.repository_owner == 'oaslananka' || github.repository_owner == 'oaslananka-ops'
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      - id: safe
        uses: ./
        with:
          path: tests/fixtures/projects/safe-basic
          config: tests/fixtures/projects/safe-basic/boardreadyops.yml
          require-kicad: "false"
          upload-sarif: "false"
          upload-artifacts: "false"
          comment-pr: "false"
          annotations: "false"
          fail-on: never
      - run: test "$SAFE_FINDINGS" = "0"
        env:
          SAFE_FINDINGS: ${{ steps.safe.outputs.findings }}
      - id: pinmap
        uses: ./
        with:
          path: tests/fixtures/projects/pinmap-mismatch
          config: tests/fixtures/projects/pinmap-mismatch/boardreadyops.yml
          require-kicad: "false"
          upload-sarif: "false"
          upload-artifacts: "false"
          comment-pr: "false"
          annotations: "false"
          fail-on: never
      - run: test "$PINMAP_FINDINGS" = "1"
        env:
          PINMAP_FINDINGS: ${{ steps.pinmap.outputs.findings }}

  sarif-upload-smoke:
    name: self-smoke / sarif-upload
    if: (github.repository_owner == 'oaslananka' || github.repository_owner == 'oaslananka-ops') && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      - id: sarif
        uses: ./
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          path: tests/fixtures/projects/safe-basic
          config: tests/fixtures/projects/safe-basic/boardreadyops.yml
          require-kicad: "false"
          upload-sarif: "true"
          upload-artifacts: "false"
          comment-pr: "false"
          annotations: "false"
          fail-on: never
      - run: test -f "$SARIF_PATH"
        env:
          SARIF_PATH: ${{ steps.sarif.outputs.sarif-path }}
