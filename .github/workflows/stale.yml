name: Mark stale issues and pull requests

on:
  schedule:
    - cron: '39 4 * * *'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  stale:
    if: github.repository_owner == 'oaslananka' || github.repository_owner == 'oaslananka-ops'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
      issues: write
      pull-requests: write

    steps:
      - uses: actions/stale@eb5cf3af3ac0a1aa4c9c45633dd1ae542a27a899
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          stale-issue-message: This issue has had no activity for 60 days. Add a comment if it is still relevant.
          stale-pr-message: This pull request has had no activity for 30 days. Rebase or comment if it is still active.
          stale-issue-label: no-issue-activity
          stale-pr-label: no-pr-activity
          days-before-issue-stale: 60
          days-before-pr-stale: 30
          days-before-close: 14
