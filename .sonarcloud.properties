# SonarQube Cloud Automatic Analysis is the authoritative Sonar execution mode.
# Do not add a CI scanner while Automatic Analysis is enabled in the SonarQube Cloud project.
# Generated output, dependency trees, tests, and migration snapshots are excluded from main-code analysis.
sonar.exclusions=dist/**,coverage/**,tests/**,apps/web/.next/**,**/node_modules/**,packages/db/prisma/migrations/**,packages/db/migrations/**
sonar.cpd.exclusions=packages/db/migrations/**
