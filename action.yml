name: BoardReadyOps
description: >-
  Fabrication readiness checks for KiCad PCB projects. Identify and fix issues
  before you order boards.
author: Osman Aslan
branding:
  icon: shield
  color: green
runs:
  using: node24
  main: dist/action/index.cjs
inputs:
  path:
    description: Directory to scan.
    required: false
    default: .
  project:
    description: Explicit .kicad_pro path. If omitted, all discovered projects are scanned.
    required: false
    default: ""
  config:
    description: Path to boardreadyops.yml.
    required: false
    default: boardreadyops.yml
  mode:
    description: "warn or enforce"
    required: false
    default: warn
  require-kicad:
    description: Fail when kicad-cli is not available.
    required: false
    default: "false"
  kicad-cli:
    description: Explicit kicad-cli path.
    required: false
    default: ""
  bom:
    description: BOM source path or "auto".
    required: false
    default: auto
  pinmap:
    description: Pinmap file path. Empty disables pinmap rules.
    required: false
    default: ""
  variant:
    description: KiCad variant name used by variant-aware BoardReadyOps rules.
    required: false
    default: ""
  gate:
    description: Gate name from boardreadyops.yml. Empty auto-detects pull_request, main, or release.
    required: false
    default: ""
  sarif:
    description: Output SARIF path. Empty disables.
    required: false
    default: boardreadyops.sarif.json
  json:
    description: Output JSON findings path. Empty disables.
    required: false
    default: boardreadyops.findings.json
  markdown:
    description: Output Markdown report path. Empty disables.
    required: false
    default: boardreadyops.report.md
  hbom:
    description: Output CycloneDX hardware SBOM path. Empty disables.
    required: false
    default: ""
  upload-sarif:
    description: Upload SARIF to GitHub Code Scanning.
    required: false
    default: "true"
  upload-artifacts:
    description: Upload reports as workflow artifacts.
    required: false
    default: "true"
  comment-pr:
    description: Post a sticky Markdown comment on pull requests.
    required: false
    default: "true"
  comment-format:
    description: Pull request comment style. One of report (full Markdown report) or review (compact release-review summary).
    required: false
    default: report
  artifact-name:
    description: Workflow artifact name.
    required: false
    default: boardreadyops
  fail-on:
    description: Severity threshold above which the action exits non-zero. One of critical, high, medium, low, never.
    required: false
    default: high
  annotations:
    description: Emit ::error/::warning workflow annotations.
    required: false
    default: "true"
  log-level:
    description: Log level. One of debug, info, warn, error, critical, silent.
    required: false
    default: info
  log-format:
    description: Log format. One of text, json.
    required: false
    default: text
  log-file:
    description: Optional log file path inside the workspace.
    required: false
    default: ""
  log-file-max-bytes:
    description: Rotate the log file after this many bytes. Empty uses the default.
    required: false
    default: ""
  log-file-retention:
    description: Number of rotated log files to keep. Empty uses the default.
    required: false
    default: ""
outputs:
  findings:
    description: Total finding count.
  critical:
    description: Count of critical findings.
  high:
    description: Count of high findings.
  medium:
    description: Count of medium findings.
  low:
    description: Count of low findings.
  sarif-path:
    description: SARIF output path if produced.
  json-path:
    description: JSON output path if produced.
  markdown-path:
    description: Markdown output path if produced.
  hbom-path:
    description: CycloneDX hardware SBOM output path if produced.
