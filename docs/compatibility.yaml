source_checked:
  date: "2026-06-02"
  node:
    releases: "https://nodejs.org/en/about/previous-releases"
    schedule: "https://github.com/nodejs/Release#release-schedule"
    index: "https://nodejs.org/dist/index.json"
  kicad:
    release: "https://www.kicad.org/blog/2026/05/KiCad-10.0.4-Release/"
    linux_packages: "https://www.kicad.org/download/linux-distros/"
    tags: "https://gitlab.com/kicad/code/kicad/-/tags"
  cyclonedx:
    specification: "https://cyclonedx.org/specification/overview/"
    schema: "https://cyclonedx.org/schema/bom-1.7.schema.json"
  github_actions:
    hosted_runners: "https://docs.github.com/en/actions/reference/runners/github-hosted-runners"
    image_migration: "https://github.blog/changelog/2026-05-14-github-actions-upcoming-image-migrations/"
kicad:
  minimum: "9.0"
  recommended: "10.0"
  latestVerified: "10.0.4"
  eol:
    - "9.0"
  tested:
    - "10.0"
  notes:
    "9.0": "Upstream EOL since April 2026. Removed from CI in May 2026 — may still work but is untested."
    "10.0": "Current recommended stable line. CI installs ppa:kicad/kicad-10.0-releases and asserts kicad-cli 10.0.x."
node:
  minimum: "22"
  minimumVersion: "22.14.0"
  recommended: "24"
  supported: ["22", "24"]
  current: ["26"]
  tested:
    "22": "22.23.1"
    "24": "24.18.0"
  policy:
    "22": "Maintenance LTS. Supported from 22.14.0 upward for existing users and tested in unit and KiCad integration jobs."
    "24": "Active LTS and recommended runtime. Used by default CI jobs, binary builds, GitHub Action runtime, and KiCad 10.0 integration jobs."
    "26": "Current release line. Tracked by drift guard but not in package engines or CI until it reaches LTS and dependency/tooling validation is added."
cyclonedx:
  specVersion: "1.7"
  schemaUrl: "https://cyclonedx.org/schema/bom-1.7.schema.json"
  hbomSchema: "schemas/hbom.schema.json"
  validation: "schemas/hbom.schema.json pins $schema and specVersion; tests/unit/report/hbom.test.ts validates generated HBOM with AJV; CI runs unit tests and verify:dist."
