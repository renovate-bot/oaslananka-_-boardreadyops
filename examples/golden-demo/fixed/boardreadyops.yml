# Golden demo - "fixed" board. Run: boardreadyops run examples/golden-demo/fixed
version: 1
projects:
  - path: .
    bom: demo-bom.csv
rules:
  drc.kicad:
    enabled: false
  erc.kicad:
    enabled: false
  release.changelog-present:
    enabled: false
  release.revision-set:
    enabled: false
  manufacturing.fab-notes:
    enabled: false
  design.copper-balance:
    enabled: false
  design.unique-references:
    enabled: true
  bom.compliance:
    enabled: true
    require: true
fail-on: high
