site_name: BoardReadyOps
site_url: https://oaslananka.github.io/boardreadyops/
repo_url: https://github.com/oaslananka/boardreadyops
repo_name: oaslananka/boardreadyops
edit_uri: edit/main/docs/
strict: true
docs_dir: docs

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate

plugins:
  - search
  - mike:
      alias_type: symlink
      canonical_version: latest

extra_css:
  - stylesheets/accessibility.css

extra_javascript:
  - javascripts/accessibility.js

extra:
  version:
    provider: mike

not_in_nav: |
  rules/*.md
  !rules/index.md
  !rules/bom.md
  !rules/design.md
  !rules/drc.md
  !rules/erc.md
  !rules/firmware.md
  !rules/manufacturing.md
  !rules/pinmap.md
  !rules/release.md
  reference/plugin-sdk/**
  !reference/plugin-sdk/README.md

nav:
  - Start:
      - Home: index.md
      - Quickstart: quickstart.md
      - Golden Demo: golden-demo.md
      - Installation: install.md
      - Configuration: configuration.md
      - Support Matrix: support-matrix.md
      - Roadmap: ROADMAP.md
      - Tutorials:
          - Getting Started: tutorials/getting-started.md
  - Use:
      - CLI: cli.md
      - Agent Planning Output: agent-planning.md
      - GitHub Action:
          - Node Action: action.md
          - Container Action: github-action.md
          - Review App: review-app.md
      - Reports:
          - JSON: reports/json.md
          - SARIF: reports/sarif.md
          - Markdown: reports/markdown.md
          - HTML: reports/html.md
          - JUnit: reports/junit.md
          - Annotations: reports/annotations.md
      - Multi-project Workspaces: multi-project.md
      - Cross-platform Paths: cross-platform.md
      - How-to Guides:
          - CI Quality Gates: how-to/ci-quality-gates.md
  - Hardware Gates:
      - Rules:
          - Overview: rules/index.md
          - BOM: rules/bom.md
