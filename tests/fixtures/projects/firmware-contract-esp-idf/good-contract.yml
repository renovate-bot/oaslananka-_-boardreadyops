version: 1
projects:
  - path: .
    pinmap: pins.yml
    firmware:
      esp-idf:
        pinAssignments: esp-idf-pins-good.yml
rules:
  drc.kicad:
    enabled: false
  erc.kicad:
    enabled: false
  release.changelog-present:
    enabled: false
  bom.missing-mpn:
    enabled: false
fail-on: high
