version: 1
projects:
  - path: .
    pinmap: pins.yml
rules:
  firmware.stm32cubemx-pin-contract:
    file: board-good.ioc
    mcu-designator: U1
  drc.kicad:
    enabled: false
  erc.kicad:
    enabled: false
  release.changelog-present:
    enabled: false
  bom.missing-mpn:
    enabled: false
fail-on: high
